<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="RODDAN Distribuidora - Especialista em pneus de moto e quadriciclo off-road. Estoque real e pronta entrega.">
    <title>RODDAN | Distribuidora Premium de Pneus</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="style.css">

    <!-- SEO Meta Tags -->
    <meta property="og:title" content="RODDAN | Distribuidora Premium de Pneus">
    <meta property="og:description" content="Performance que leva você além. Especialista em off-road.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Favicon (User should replace) -->
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛞</text></svg>">
</head>

<body>
    <header id="header">
        <div class="container nav-container">
            <a href="#" class="logo" id="brand-logo">
                <img src="/assets/logo.png" alt="RODDAN"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span class="logo-text" style="display:none;">RODDAN<span>.</span></span>
            </a>

            <nav class="nav-links">
                <a href="#hero">Início</a>
                <a href="#produtos">Produtos</a>
                <a href="#sobre">Sobre</a>
                <a href="#diferenciais">Diferenciais</a>
            </nav>

            <div class="header-tire">
                <img src="/assets/tire.png" id="header-tire-el" alt="🛞"
                    style="width: 100%; height: 100%; object-fit: contain;"
                    onerror="this.src='https://cdn-icons-png.flaticon.com/512/115/115865.png'">
            </div>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="hero" id="hero">
            <video class="hero-video" autoplay muted loop playsinline id="hero-video-el"
                src="/assets/videos/hero-background.mp4"></video>
            <div class="hero-overlay"></div>
            <div class="container hero-content">
                <h1 id="hero-title"></h1>
                <p id="hero-subtitle"></p>
                <div class="cta-group">
                    <a href="#" class="btn btn-primary whatsapp-link" id="hero-cta-primary"></a>
                    <a href="#produtos" class="btn btn-secondary" id="hero-cta-secondary"></a>
                </div>
            </div>
        </section>

        <!-- Value Prop -->
        <section class="section-padding container padding-bottom-small">
            <div class="value-grid" id="value-prop-grid">
                <!-- Injected via main.js -->
            </div>
        </section>

        <!-- Storytelling -->
        <section class="section-padding container" id="sobre">
            <div class="story">
                <div class="story-content reveal">
                    <h2 id="story-title"></h2>
                    <p id="story-text"></p>
                    <a href="#" class="btn btn-primary whatsapp-link">Falar com Consultor</a>
                </div>
                <div class="story-image reveal">
                    <div class="story-img-container">
                        <img src="" id="story-img-el" alt="Trilha Off-road">
                    </div>
                </div>
            </div>
        </section>

        <!-- Product Categories Gallery -->
        <section class="section-padding bg-red-section" id="produtos">
            <div class="container">
                <h2 class="reveal" id="categories-title" style="text-align: center; margin-bottom: 1rem;"></h2>
                <p class="reveal" style="text-align: center; color: var(--text-dim); margin-bottom: 4rem;">Deslize para
                    ver nossos pneus especializados.</p>
            </div>
            <div class="gallery-container">
                <div class="gallery-track animate" id="category-grid-el">
                    <!-- Injected via main.js -->
                </div>
            </div>
        </section>

        <!-- Differentials -->
        <section class="section-padding" id="diferenciais">
            <div class="container container-box reveal">
                <div style="text-align: center; margin-bottom: 4rem;">
                    <h2 id="differentials-title"></h2>
                    <p id="differentials-subtitle" style="color: var(--text-dim); margin-top: 1rem;"></p>
                </div>
                <div class="diff-grid" id="differentials-list">
                    <!-- Injected via main.js -->
                </div>
            </div>
        </section>

        <!-- How it Works -->
        <section class="section-padding container">
            <div style="text-align: center;">
                <h2 class="reveal" id="how-title"></h2>
            </div>
            <div class="steps-grid" id="how-steps">
                <!-- Injected via main.js -->
            </div>
        </section>

        <!-- Final CTA -->
        <section class="section-padding final-cta">
            <div class="container reveal">
                <h2 id="final-cta-title"></h2>
                <p id="final-cta-subtitle"></p>
                <a href="#" class="btn btn-primary whatsapp-link" id="final-cta-btn"></a>
            </div>
        </section>
    </main>

    <footer id="footer">
        <div class="container footer-grid">
            <div>
                <h3 id="footer-logo"></h3>
                <p style="color: var(--text-dim); margin-top: 1rem;" id="footer-tagline"></p>
            </div>
            <div>
                <h4>Contato</h4>
                <p style="margin-top: 1rem;" id="footer-address"></p>
                <p id="footer-cnpj"></p>
            </div>
            <div>
                <h4>Redes Sociais</h4>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <a href="#" class="whatsapp-link">Instagram</a>
                    <a href="#" class="whatsapp-link">Facebook</a>
                    <a href="#" class="whatsapp-link">LinkedIn</a>
                </div>
            </div>
        </div>
        <div class="container footer-bottom">
            <p>&copy; 2024 <span id="copyright-brand"></span>. Todos os direitos reservados.</p>
            <div>
                <a href="#">Privacidade</a> | <a href="#">Termos</a>
            </div>
        </div>
    </footer>

    <div class="tire-container" id="tire-anim">
        <img src="/assets/tire.png" class="tire-img" id="tire-el" alt="Pneu"
            onerror="this.src='https://cdn-icons-png.flaticon.com/512/115/115865.png'">
    </div>

    <a href="#" class="whatsapp-float whatsapp-link">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width: 35px; height: 35px;">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.414 0 .018 5.396.015 12.03c0 2.123.551 4.197 1.594 6.039L0 24l6.105-1.602a11.834 11.834 0 0 0 5.937 1.598h.005c6.637 0 12.032-5.395 12.035-12.03a11.782 11.782 0 0 0-3.48-8.517z" />
        </svg>
    </a>

    <script type="module" src="main.js"></script>
</body>

</html>
